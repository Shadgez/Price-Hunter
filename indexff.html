<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0B0F17" />
  <title>PriceHunter — Never Overpay Again</title>
  <meta name="description" content="Compare prices across Amazon, Flipkart, Croma and more — and find the best overall deal, not just the cheapest." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>" />
  <link rel="manifest" href="manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind (Play CDN — no build step needed) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#4F8CFF",
            accent: "#00D084",
            bg: "#0B0F17",
            card: "#151B26",
            "card-light": "#F5F7FA",
            "bg-light": "#FFFFFF",
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Space Grotesk", "sans-serif"],
          },
          borderRadius: { xl2: "16px" },
        },
      },
    };
  </script>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="initial-loader">Loading PriceHunter…</div>
  <div id="app"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    // Hide the initial loader once app.js has rendered its first frame.
    const hideLoader = () => document.getElementById("initial-loader")?.remove();
    const observer = new MutationObserver(() => {
      if (document.getElementById("app").children.length > 0) {
        hideLoader();
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById("app"), { childList: true });
    setTimeout(hideLoader, 4000); // safety fallback
  </script>
</body>
</html>
